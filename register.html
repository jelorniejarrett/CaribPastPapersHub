<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Past Paper Hub JA | Register</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
  <div class="container navbar">
    <a class="brand" href="index.html">
      <span class="brand-badge">PP</span>
      <span>Past Paper Hub JA</span>
    </a>
    <nav aria-label="Main navigation">
      <ul>
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="products.html">Products</a></li>
        <li><a class="nav-link" href="cart.html">Cart <span data-cart-count>0</span></a></li>
        <li><a class="nav-link" href="checkout.html">Checkout</a></li>
        <li><a class="nav-link" href="login.html">Login</a></li>
        <li><a class="nav-link" href="register.html">Register</a></li>
        <li><a class="nav-link" href="about.html">About Us</a></li>
        <li><a class="nav-link" href="../Assets/StoryBoard.pdf" target="_blank" rel="noopener noreferrer">Storyboard</a></li>
        <li><a class="nav-link" href="https://github.com/jelorniejarrett-2402228/Past_Paper_Hub_JA_" target="_blank" rel="noopener noreferrer">Repository</a></li>
      </ul>
    </nav>
  </div>
</header>

  <main class="section">
    <div class="container">
      <div class="section-title">
        <div>
          <h2>Register</h2>
          <p>Create your account to start shopping.</p>
        </div>
      </div>

      <div class="form-card">
        <form id="registerForm">
          <div class="form-grid">
            <div>
              <label for="fullName">Full Name</label>
              <input id="fullName" type="text" placeholder="Your full name">
            </div>
            <div>
              <label for="dob">Date of Birth</label>
              <input id="dob" type="date">
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="name@example.com">
            </div>
            <div>
              <label for="regUsername">Username</label>
              <input id="regUsername" type="text" placeholder="Choose a username">
            </div>
            <div class="span-all">
              <label for="regPassword">Password</label>
              <input id="regPassword" type="password" placeholder="Create a password">
              <p class="form-help">Password must be at least 6 characters.</p>
            </div>
          </div>
          <div class="hero-actions">
            <button class="btn btn-primary" type="submit">Register</button>
            <button class="btn btn-outline" type="reset">Clear</button>
          </div>
          <div id="registerMessage" class="message" role="alert"></div>
        </form>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
