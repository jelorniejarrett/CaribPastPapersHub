<header>
  <div class="container navbar">
    <a class="brand" href="index.html">
      <span class="brand-badge">PP</span>
      <span>Past Paper Hub JA</span>
    </a>
    <nav aria-label="Main navigation">
      <ul>
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="products.html">Products</a></li>
        <li><a class="nav-link" href="cart.html">Cart <span data-cart-count>0</span></a></li>

  </div>
</header>

  <main class="section">
    <div class="container">
      <div class="section-title">
        <div>
          <h2>Login</h2>
          <p>Enter your account details to continue.</p>
        </div>
      </div>

      <div class="form-card">
        <form id="loginForm">
          <div class="form-grid">
            <div>
              <label for="loginUsername">Username</label>
              <input id="loginUsername" type="text" placeholder="Enter username">
            </div>
            <div>
              <label for="loginPassword">Password</label>
              <input id="loginPassword" type="password" placeholder="Enter password">
            </div>
          </div>
          <div class="hero-actions">
            <button class="btn btn-primary" type="submit">Login</button>
            <button class="btn btn-outline" type="reset">Clear</button>
          </div>
          <div id="loginMessage" class="message" role="alert"></div>
        </form>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
